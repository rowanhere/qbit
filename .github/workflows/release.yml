name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-cuda:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - name: ada-rtx40
            arch: sm_89
          - name: ampere-rtx30
            arch: sm_86
    steps:
      - uses: actions/checkout@v4
      - uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: "12.4.1"
          method: network
      - name: Build
        run: |
          make clean
          make NVCC=/usr/local/cuda/bin/nvcc ARCH=${{ matrix.arch }}
          mkdir -p dist
          cp qbminer dist/qbminer-linux-x86_64-${{ matrix.name }}
          tar -C dist -czf qbminer-linux-x86_64-${{ matrix.name }}.tar.gz qbminer-linux-x86_64-${{ matrix.name }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qbminer-linux-x86_64-${{ matrix.name }}
          path: qbminer-linux-x86_64-${{ matrix.name }}.tar.gz
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: qbminer-linux-x86_64-${{ matrix.name }}.tar.gz
